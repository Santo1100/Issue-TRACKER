<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker</title>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
</head>
<body>
    <header class="mb-4">
        <div class="navbar bg-base-100 flex justify-between">
  <div class="flex items-center justify-center gap-2">
    <img src="./assets/github-logo.png" alt="">
    <p class="text-4xl font-bolder">GitHub Issues Tracker</p>
  </div>
  
  <div class="flex gap-2">
    <input id="Search" onkeyup="search()" type="text" placeholder="Search" class="input  w-24 md:w-auto" />
    <button class="btn btn-active btn-primary">+New Issues</button>
  </div>
</div>
    </header>

   <main>
     <section class="nav-section bg-white shadow
     shadow-sm w-11/12 mx-auto h-20 p-7 justify-center ">
     
        <div id="btn-container" class="flex gap-2">
            <button class="btn btn-active btn-primary">All</button>
            <button class="btn btn-active btn-outline">Open</button>
        <button class="btn btn-active btn-outline">Closed</button>
        </div>
        

    </section>

    <section class="flex justify-between items-center mt-4 w-11/12 mx-auto">

       <div class="flex ">
        <img src="./assets/Aperture.png" alt="">
         <div>
            <h2 class="text-xl font-bold"><span id="total-issues">50</span> Issues</h2>
            <p class="line-clamp-1">Track and manage your project issues</p>
        </div>

       
       </div>

        <div class="flex gap-6 mr-4">
            <p class="flex"><img src="./assets/Open-Status.png" alt=""><span>Open</span></p>
            <p class="flex"><img src="./assets/Closed- Status .png" alt=""><span>Closed</span></p>
        </div>
        
    </section>

    <!-- loading spinner -->
    <div id="spinner" class="flex justify-center hidden">

        <span class="loading loading-infinity loading-xs"></span>
        <span class="loading loading-infinity loading-sm"></span>
<span class="loading loading-infinity loading-md"></span>
<span class="loading loading-infinity loading-lg"></span>
<span class="loading loading-infinity loading-xl"></span>

    </div>

    
    <!-- card section -->
    <section id="card-section" class=" mt-6 grid grid-cols-4 gap-4 w-11/12 mx-auto">

       

    </section>

    <!-- modal section -->

   <section>

<dialog id="issue-details-modal" class="modal">
  <div class="modal-box space-y-4">

      <!-- Title -->
      <h3 class="font-bold text-2xl" id="modalTitle">
        Fix broken image uploads
      </h3>

      <!-- Status row -->
      <div class="flex justify-between">
        <h2 id="Status" class="bg-green-600 text-white px-2 py-1 rounded">Closed</h2>
        <p class="text-gray-400">
          Opened by <span id="author">Fahim Ahmed</span>
        </p>
        <p id="date" class="text-gray-400">22/02/2026</p>
      </div>

      <!-- Labels -->
      <div id="modal-labels" class="flex gap-2">
        <p class="bg-yellow-300 px-2 rounded">bug</p>
        <p class="bg-yellow-300 px-2 rounded">help wanted</p>
      </div>

      <!-- Description -->
      <p id="description">
        The navigation menu doesn't collapse properly on mobile devices.
        Need to fix the responsive behavior.
      </p>

      <div class="flex gap-6">
        <p id="assignee">Fahim Ahmed</p>
        <p id="M-priority" class="text-xl font-bold">High</p>
      </div>

      <!-- Modal button -->
      <div class="modal-action">
        <form method="dialog">
          <button class="btn btn-primary">Close</button>
        </form>
      </div>

  </div>
</dialog>

</section>




   </main>



   <script src="./js/main.js"></script>
</body>
</html>
