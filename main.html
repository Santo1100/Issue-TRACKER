<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker</title>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
</head>
<body>
    <header class="mb-4">
        <div class="navbar bg-base-100 flex justify-between">
  <div class="flex items-center justify-center gap-2">
    <img src="./assets/github-logo.png" alt="">
    <p class="text-4xl font-bolder">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input  w-24 md:w-auto" />
    <button class="btn btn-active btn-primary">+New Issues</button>
  </div>
</div>
    </header>

   <main>
     <section class="nav-section bg-white shadow
     shadow-sm w-11/12 mx-auto h-20 p-7 justify-center ">
     
        <div id="btn-container" class="flex gap-2">
            <button class="btn btn-active btn-primary">All</button>
            <button class="btn btn-active btn-outline">Open</button>
        <button class="btn btn-active btn-outline">Closed</button>
        </div>
        

    </section>

    <section class="flex justify-between items-center mt-4 w-11/12 mx-auto">

       <div class="flex ">
        <img src="./assets/Aperture.png" alt="">
         <div>
            <h2 class="text-xl font-bold"><span id="total-issues">50</span> Issues</h2>
            <p class="line-clamp-1">Track and manage your project issues</p>
        </div>

       
       </div>

        <div class="flex gap-6 mr-4">
            <p class="flex"><img src="./assets/Open-Status.png" alt=""><span>Open</span></p>
            <p class="flex"><img src="./assets/Closed- Status .png" alt=""><span>Closed</span></p>
        </div>
        
    </section>


    <section id="card-section" class=" mt-6 grid grid-cols-4 gap-4 w-11/12 mx-auto">

       

    </section>
   </main>



   <script src="./js/main.js"></script>
</body>
</html>
